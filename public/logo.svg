<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- BACKGROUND BRAND ACCENT SHADOW -->
  <rect x="36" y="36" width="452" height="452" rx="0" fill="#1D3557" />
  
  <!-- PRIMARY CONTAINER BLOCK -->
  <rect x="24" y="24" width="452" height="452" rx="0" fill="#F1FAEE" stroke="#1D3557" stroke-width="8" stroke-linejoin="miter" />

  <!-- INTERNAL GEOMETRIC GRID ACCENT (BRUTALIST LINES) -->
  <line x1="24" y1="96" x2="476" y2="96" stroke="#1D3557" stroke-width="4" />
  <line x1="24" y1="404" x2="476" y2="404" stroke="#1D3557" stroke-width="4" />

  <!-- TACTILE MONOLITH HARD OFFSET DROP SHADOW -->
  <g transform="translate(12, 12)">
    <!-- Diagonal Yellow Leg Shadow -->
    <polygon points="128,128 208,128 384,304 384,360 304,360 128,184" fill="#1D3557" stroke="#1D3557" stroke-width="8" stroke-linejoin="miter" />
    <!-- Diagonal Red Leg Shadow -->
    <polygon points="304,128 384,128 384,184 208,360 128,360 128,304" fill="#1D3557" stroke="#1D3557" stroke-width="8" stroke-linejoin="miter" />
    <!-- Interlocking Core Diamond Shadow -->
    <polygon points="256,192 320,256 256,320 192,256" fill="#1D3557" stroke="#1D3557" stroke-width="8" stroke-linejoin="miter" />
  </g>

  <!-- ACTIVE OVERLAPPING MONOLITHIC GLYPH -->
  <g>
    <!-- Yellow Diagonal Column (Cyber Yellow) -->
    <polygon points="128,128 208,128 384,304 384,360 304,360 128,184" fill="#F9C74F" stroke="#1D3557" stroke-width="8" stroke-linejoin="miter" />
    <!-- Red Diagonal Column (Vibrant Crimson Red) -->
    <polygon points="304,128 384,128 384,184 208,360 128,360 128,304" fill="#E63946" stroke="#1D3557" stroke-width="8" stroke-linejoin="miter" />
    <!-- Interlocking Anvil Forge Core (Teal Green Accent) -->
    <polygon points="256,192 320,256 256,320 192,256" fill="#2A9D8F" stroke="#1D3557" stroke-width="8" stroke-linejoin="miter" />
    <!-- Compiler Mechanical Terminal Brace Inset (>) -->
    <polyline points="236,226 276,256 236,286" fill="none" stroke="#F1FAEE" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" />
  </g>

  <!-- DESIGN LABELS (NEOBRUTALISTIC BRAND METRICS) -->
  <text x="44" y="70" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="900" fill="#1D3557" letter-spacing="1">ARCHFORGEX // LOGO v1.0</text>
  <text x="320" y="446" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="900" fill="#1D3557" letter-spacing="1">SYS_COMPILER_X</text>
</svg>
